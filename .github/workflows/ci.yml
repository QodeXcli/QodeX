name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # `npm ci` — deterministic, lockfile-exact install (the lockfile is committed and
      # in sync). Faster and reproducible vs. `npm install`, and it hard-fails early if
      # package.json and package-lock.json ever drift.
      - name: Install dependencies
        run: npm ci

      # `npm run build` runs tsc over the whole project — this is the check that
      # catches the real breakages (bad imports, type errors) before they land.
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `npm test` is `vitest run`. The standalone (process.exit) suites are
      # excluded via STANDALONE_SCRIPTS in vitest.config.ts, so this is clean.
      - name: Test
        run: npm test
